      for (const doctor of DOCTORS) {
        try {
          const { id, ...data } = doctor;
          await setDoc(doc(db, 'doctors', id), data);
          log.innerHTML += `<span class="ok">✓ Dr. ${doctor.firstName} ${doctor.lastName} (${doctor.specialty})</span>\n`;
        } catch (e) {
          log.innerHTML += `<span class="err">✗ ${doctor.firstName}: ${e.message}</span>\n`;
        }
      }
      log.innerHTML += '\n<strong>Done!</strong> Refresh /search to see doctors.';
